<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashEspañol ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       SCREEN 1 — Category Selection
  ══════════════════════════════════════ -->
  <div id="category-screen">

    <header class="app-header">
      <div class="header-glow"></div>
      <h1>Flash<span class="gold">Español</span></h1>
      <p class="subtitle">Master Spanish vocabulary, one card at a time</p>
    </header>

    <main class="category-main">

      <!-- Shuffle toggle -->
      <div class="options-row">
        <span class="options-label">Deck order</span>
        <button class="shuffle-toggle" id="btn-shuffle-toggle" aria-pressed="false">
          <span class="toggle-icon">🔀</span>
          <span class="toggle-text">Shuffle <strong>OFF</strong></span>
          <span class="toggle-pill"></span>
        </button>
      </div>

      <h2 class="section-title">Choose a Category</h2>

      <!-- Category grid -->
      <div class="category-grid">

        <!-- All Cards — featured -->
        <button class="cat-card cat-all" data-category="all">
          <span class="cat-icon">⭐</span>
          <div class="cat-info">
            <span class="cat-name">All Cards</span>
            <span class="cat-count">40 cards</span>
          </div>
        </button>

        <button class="cat-card" data-category="Greetings">
          <span class="cat-icon">👋</span>
          <div class="cat-info">
            <span class="cat-name">Greetings</span>
            <span class="cat-count">8 cards</span>
          </div>
        </button>

        <button class="cat-card" data-category="Animals">
          <span class="cat-icon">🐾</span>
          <div class="cat-info">
            <span class="cat-name">Animals</span>
            <span class="cat-count">8 cards</span>
          </div>
        </button>

        <button class="cat-card" data-category="Colors">
          <span class="cat-icon">🎨</span>
          <div class="cat-info">
            <span class="cat-name">Colors</span>
            <span class="cat-count">8 cards</span>
          </div>
        </button>

        <button class="cat-card" data-category="Everyday Words">
          <span class="cat-icon">🏠</span>
          <div class="cat-info">
            <span class="cat-name">Everyday Words</span>
            <span class="cat-count">8 cards</span>
          </div>
        </button>

        <button class="cat-card" data-category="Food & Drink">
          <span class="cat-icon">🍽️</span>
          <div class="cat-info">
            <span class="cat-name">Food &amp; Drink</span>
            <span class="cat-count">8 cards</span>
          </div>
        </button>

      </div>
    </main>

  </div>


  <!-- ══════════════════════════════════════
       SCREEN 2 — Flashcard Game
  ══════════════════════════════════════ -->
  <div id="app" class="hidden">

    <!-- Top bar: back button + category name + score -->
    <div class="top-bar">
      <button class="btn-back" id="btn-back" title="Change category">← Back</button>
      <span class="top-category" id="top-category">Greetings</span>
      <span class="top-score" id="top-score">✅ 0 &nbsp; ❌ 0</span>
    </div>

    <!-- Progress bar + counter -->
    <div class="progress-row">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="card-counter" id="card-counter">1 / 8</span>
    </div>

    <!-- Flashcard -->
    <div class="card-scene">
      <div class="card" id="flashcard">

        <div class="card-face card-front">
          <span class="lang-badge">🇪🇸 Spanish</span>
          <h2 class="word" id="spanish-word">Hola</h2>
          <p class="flip-hint">Tap to reveal →</p>
        </div>

        <div class="card-face card-back">
          <span class="lang-badge">🇬🇧 English</span>
          <h2 class="word" id="english-word">Hello</h2>
          <p class="flip-hint">How did you do?</p>
        </div>

      </div>
    </div>

    <!-- Answer buttons (appear after flip) -->
    <div class="answer-buttons" id="answer-buttons">
      <button class="btn btn-correct" id="btn-correct">✅ Got it!</button>
      <button class="btn btn-wrong"   id="btn-wrong">❌ Missed it</button>
    </div>

  </div>


  <!-- ══════════════════════════════════════
       SCREEN 3 — End / Results
  ══════════════════════════════════════ -->
  <div id="end-screen" class="hidden">
    <div class="end-card">
      <div class="end-emoji" id="end-emoji">🎉</div>
      <h2 class="end-title">Session Complete!</h2>
      <p class="end-message" id="end-message">Great work!</p>
      <div class="end-score-box">
        <span id="end-score-text">16 / 20</span>
        <span id="end-pct-text">80%</span>
      </div>
      <div class="end-actions">
        <button class="btn btn-restart" id="btn-restart">🔄 Try Again</button>
        <button class="btn btn-change-cat" id="btn-change-cat">📂 Change Category</button>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
